<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AST-Thinker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
    <nav class="nav">
        <a href="{{ url_for('index') }}">Главная</a>
        <a href="{{ url_for('chat_page') }}">Чат</a>
        <a href="{{ url_for('thoughts_page') }}">Журнал мыслей</a>
        <a href="{{ url_for('history_page') }}">История</a>
        <a href="{{ url_for('memory_page') }}">Долговременная память</a>
        <a href="{{ url_for('settings_page') }}">Настройки</a>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
